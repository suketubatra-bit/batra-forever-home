// ─── EMBED HELPERS ────────────────────────────────────────────
function getEmbedUrl(item) {
  if (!item.url) return null;
  const url = item.url;
  if (item.content_type === 'instagram_reel') {
    const m = url.match(/\/reel\/([^/?]+)/);
    // CAPTIONED embed: this is the full interactive player — the reel video plays
    // INLINE. The bare /embed/ (non-captioned) form renders only a static cover with
    // a play button that redirects to instagram.com, so we must keep /captioned/ for
    // playback. It's taller (adds a caption block) but InstaEmbed auto-sizes to it.
    return m ? `https://www.instagram.com/reel/${m[1]}/embed/captioned/` : null;
  }
  if (item.content_type === 'instagram_post') {
    const m = url.match(/\/p\/([^/?]+)/);
    return m ? `https://www.instagram.com/p/${m[1]}/embed/captioned/` : null;
  }
  if (item.content_type === 'youtube') {
    const m = url.match(/shorts\/([^/?]+)/) || url.match(/(?:v=|youtu\.be\/)([^/?&]+)/);
    return m ? `https://www.youtube.com/embed/${m[1]}` : null;
  }
  return null;
}

function getPhotoUrl(item) {
  if (item.content_type === 'photo' && item.url) {
    if (item.url.startsWith('http')) return item.url;
    const fname = item.url.split('/').pop();
    return SUPABASE_STORAGE + fname;
  }
  if (item.thumbnail_url) return item.thumbnail_url;
  return null;
}

function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/shorts\/([^/?]+)/) || url.match(/(?:v=|youtu\.be\/)([^/?&]+)/);
  return m ? m[1] : null;
}

// Lightweight static thumbnail for the grid (NO live iframe).
// Photos use stored image; YouTube uses its thumbnail; Instagram uses the
// pre-fetched thumbnail_url stored in Supabase Storage. Returns null if none.
function getThumbUrl(item) {
  if (item.content_type === 'photo') return getPhotoUrl(item);
  if (item.content_type === 'youtube') {
    const id = getYouTubeId(item.url);
    if (id) return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  }
  if (item.thumbnail_url) return item.thumbnail_url;
  return null;
}

// Lazy-loading embed component — only loads iframe when scrolled into view
function LazyEmbed({ src, className = '', style = {} }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { rootMargin: '200px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <div ref={ref} className={className} style={style}>
      {visible ? (
        <iframe src={src} loading="lazy" allowTransparency="true" allow="encrypted-media"
          className="w-full h-full border-0" style={{background:'#000'}}/>
      ) : (
        <div className="w-full h-full shimmer"/>
      )}
    </div>
  );
}

// Instagram embed that auto-sizes to its REAL content height. The IG embed
// page posts a {type:'MEASURE',details:{height}} message to the parent; we
// listen for it and size the iframe exactly, so the media is never cut off and
// there's no inner scrollbar. Uses the /embed/captioned/ URL (see getEmbedUrl)
// because that form plays the reel video inline; the height grows to fit the
// caption block, which the MEASURE message handles automatically.
function InstaEmbed({ src, type }) {
  const [h, setH] = useState(type === 'instagram_reel' ? 640 : 560);
  useEffect(() => {
    function onMsg(e) {
      if (typeof e.origin === 'string' && e.origin.indexOf('instagram.com') === -1) return;
      let d = e.data;
      if (typeof d === 'string') { try { d = JSON.parse(d); } catch (_) { return; } }
      if (d && d.type === 'MEASURE' && d.details && d.details.height) {
        setH(Math.max(320, Math.ceil(+d.details.height)));
      }
    }
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);
  return (
    <iframe src={src} scrolling="no" allowFullScreen
      className="w-full border-0 rounded-lg" style={{height: h + 'px', background: '#000'}}
      allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
      allowTransparency="true"/>
  );
}

              <label className="block text-sm text-dark-300 mb-1">Email</label>

                className="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:ring-2 focus:ring-accent focus:outline-none"
                placeholder="your@email.com"/>
            </div>
            <div>
              <label className="block text-sm text-dark-300 mb-1">Password</label>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                className="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:ring-2 focus:ring-accent focus:outline-none"
                placeholder="Min 6 characters"/>
            </div>
            {error && <p className="text-red-400 text-sm">{error}</p>}
            <button type="submit" disabled={loading}
              className="w-full bg-accent hover:bg-accent-dark disabled:opacity-50 text-white font-bold py-3 rounded-lg transition-colors">
              {loading ? 'Please wait...' : isSignUp ? 'Create Account' : 'Sign In'}
            </button>
          </form>
        </div>

        <div className="grid grid-cols-4 gap-3">
          {FAMILY.map(f => (
            <div key={f.name} className="text-center">
              <div className="w-10 h-10 rounded-full mx-auto flex items-center justify-center text-white text-xs font-bold"
                style={{backgroundColor: f.color}}>{f.initials}</div>
              <p className="text-dark-400 text-xs mt-1">{f.name}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── STAR RATING COMPONENT ─────────────────────────────────────
function StarRating({ rating = 0, onRate, size = 'md', readOnly = false }) {
  const [hover, setHover] = useState(0);
  const sz = size === 'sm' ? 'text-sm' : size === 'lg' ? 'text-2xl' : 'text-lg';

  return (
    <div className="flex gap-0.5">
      {[1,2,3,4,5].map(star => (
        <button key={star} disabled={readOnly}
          className={`star-btn ${sz} ${readOnly ? 'cursor-default' : 'cursor-pointer'}`}
          onMouseEnter={() => !readOnly && setHover(star)}
          onMouseLeave={() => !readOnly && setHover(0)}
          onClick={() => !readOnly && onRate && onRate(star)}>
          {star <= (hover || rating) ? '★' : '☆'}
        </button>
      ))}
    </div>
  );
}

// ─── FAMILY RATINGS DISPLAY ────────────────────────────────────
function FamilyRatings({ ratings = [], compact = false }) {
  return (
    <div className={compact ? "flex gap-2 flex-wrap" : "space-y-1"}>
      {FAMILY.map(f => {
        const r = ratings.find(r => r.user_name === f.name);
        if (!r && compact) return null;
        return (
          <div key={f.name} className={`flex items-center gap-1.5 ${compact ? '' : ''}`}>
            <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-[9px] font-bold flex-shrink-0"
              style={{backgroundColor: f.color}}>{f.initials}</div>
            {compact ? (
              <span className="text-xs font-medium">{r ? `${r.rating}★` : '—'}</span>
            ) : (
              <StarRating rating={r?.rating || 0} size="sm" readOnly/>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── ITEM CARD ─────────────────────────────────────────────────
// Thumbnail-first: the grid shows a lightweight cached <img> only (no live
// iframe), so previews stay put when scrolling and the page stays light.
// The full interactive embed loads in the detail modal when the card is opened.
const ItemCard = React.memo(function ItemCard({ item, rooms, categories, onRate, currentUserId, onSelect, isSelected, onOpenDetail, selectMode, inTagSelection, onToggleTagSelect }) {
  const [imgFailed, setImgFailed] = useState(false);
  const myRating = item.ratings?.find(r => r.user_id === currentUserId)?.rating || 0;
  const avgRating = item.ratings?.length > 0
    ? (item.ratings.reduce((s,r) => s + r.rating, 0) / item.ratings.length).toFixed(1)
    : '—';
  const totalRatings = item.ratings?.filter(r => r.rating > 0).length || 0;

  const itemRooms = rooms.filter(r => item.room_ids?.includes(r.id));
  const itemCats = categories.filter(c => item.category_ids?.includes(c.id));

  const thumbUrl = getThumbUrl(item);
  const icon = CONTENT_ICONS[item.content_type] || '📎';

  const handleCardClick = () => {
    if (selectMode) { onToggleTagSelect(item.id); }
    else { onOpenDetail(item); }
  };

  return (
    <div className={`card-hover glass rounded-xl overflow-hidden fade-in cursor-pointer group
      ${inTagSelection ? 'ring-2 ring-purple-500' : isSelected ? 'ring-2 ring-accent' : ''}`}
      style={{contentVisibility:'auto', containIntrinsicSize:'320px'}}
      onClick={handleCardClick}>

      {/* Visual Preview — static thumbnail image, never a live iframe */}
      <div className="relative bg-dark-800 overflow-hidden">
        <div className="aspect-[4/3]">
          {thumbUrl && !imgFailed ? (
            <img src={thumbUrl} alt={item.title} loading="lazy" decoding="async"
              onError={() => setImgFailed(true)}
              className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
          ) : (
            <div className="w-full h-full flex flex-col items-center justify-center gap-1 bg-gradient-to-br from-dark-700 to-dark-800">
              <span className="text-5xl opacity-30">{icon}</span>
              <span className="text-[10px] text-dark-500 uppercase tracking-wider">tap to open</span>
            </div>
          )}
        </div>

        {/* Type badge */}
        <div className="absolute top-2 left-2 bg-dark-900/80 backdrop-blur-sm rounded-full px-2 py-0.5 text-xs flex items-center gap-1">
          <span>{icon}</span>
          <span className="text-dark-300">{item.content_type.replace('_',' ')}</span>
        </div>

        {/* Average rating badge */}
        {totalRatings > 0 && (
          <div className="absolute top-2 right-2 bg-accent/90 backdrop-blur-sm rounded-full px-2 py-0.5 text-xs font-bold text-white flex items-center gap-1">
            ★ {avgRating}
            <span className="text-white/70">({totalRatings})</span>
          </div>
        )}

        {/* Selection control — tag-select in select mode, else compare checkbox */}
        {selectMode ? (
          <div className="absolute bottom-2 right-2">
            <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center transition-colors
              ${inTagSelection ? 'bg-purple-500 border-purple-500 text-white' : 'border-white/70 bg-dark-900/60 text-transparent'}`}>
              ✓
            </div>
          </div>
        ) : (
          <div className="absolute bottom-2 right-2" onClick={e => { e.stopPropagation(); onSelect(item.id); }}>
            <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors
              ${isSelected ? 'bg-accent border-accent text-white' : 'border-dark-400 bg-dark-900/60 text-transparent hover:border-accent'}`}>
              ✓
            </div>
          </div>
        )}
      </div>

      {/* Content */}
      <div className="p-3 space-y-2">
        <h3 className="font-semibold text-sm text-dark-100 truncate">{item.title}</h3>

        {/* Tags */}
        <div className="flex flex-wrap gap-1">
          {itemRooms.map(r => (
            <span key={r.id} className="tag-pill bg-dark-700 text-dark-300">{r.icon} {r.name.split(' ')[0]}</span>
          ))}
          {itemCats.map(c => (
            <span key={c.id} className="tag-pill bg-accent/10 text-accent">{c.icon} {c.name}</span>
          ))}
          {!itemRooms.length && !itemCats.length && (
            <span className="tag-pill bg-dark-700 text-dark-500">Unsorted</span>
          )}
        </div>

        {/* My Rating */}
        <div className="flex items-center justify-between pt-1 border-t border-dark-700">
          <span className="text-[10px] text-dark-500 uppercase tracking-wider">Your rating</span>
          <div onClick={e => e.stopPropagation()}>
            <StarRating rating={myRating} size="sm" onRate={(r) => onRate(item.id, r)}/>
          </div>
        </div>
      </div>
    </div>
  );
});

// ─── ITEM DETAIL MODAL ─────────────────────────────────────────
function ItemDetail({ item, rooms, categories, allRooms, allCategories, onClose, onRate, currentUserId, currentUserName, profiles = [], supabase }) {
  const [activeTab, setActiveTab] = useState('info');
  const [comment, setComment] = useState('');
  const [comments, setComments] = useState([]);
  const [mentionOpen, setMentionOpen] = useState(false);
  const [mentionQuery, setMentionQuery] = useState('');
  const [sending, setSending] = useState(false);
  const commentRef = useRef(null);
  const mediaRef = useRef(null);
  const [isFs, setIsFs] = useState(false);

  // Fullscreen the media frame. Photos/iframes fill the screen (see .media-fs CSS).
  const toggleFullscreen = () => {
    const el = mediaRef.current;
    if (!el) return;
    if (document.fullscreenElement) document.exitFullscreen?.();
    else (el.requestFullscreen?.() || el.webkitRequestFullscreen?.());
  };
  useEffect(() => {
    const onFs = () => setIsFs(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onFs);
    return () => document.removeEventListener('fullscreenchange', onFs);
  }, []);

  // Family members other than me, optionally filtered by what's typed after "@"
  const mentionCandidates = FAMILY
    .filter(f => f.name !== currentUserName)
    .filter(f => f.name.toLowerCase().startsWith(mentionQuery.toLowerCase()));
  const [editTags, setEditTags] = useState(false);
  const [selectedRooms, setSelectedRooms] = useState(item.room_ids || []);
  const [selectedCats, setSelectedCats] = useState(item.category_ids || []);
  const [editTitle, setEditTitle] = useState(false);
  const [title, setTitle] = useState(item.title);
  const myRating = item.ratings?.find(r => r.user_id === currentUserId)?.rating || 0;

  useEffect(() => {
    loadComments();
  }, [item.id]);

  const loadComments = async () => {
    const { data } = await supabase.from('comments').select('*').eq('item_id', item.id).order('created_at', { ascending: true });
    if (data) setComments(data);
  };

  // Detect @mentions: any family name written as "@Name" in the comment body
  const detectMentions = (text) => {
    const named = FAMILY.filter(f => new RegExp('@' + f.name + '\\b', 'i').test(text)).map(f => f.name);
    return [...new Set(named)];
  };

  const onCommentChange = (e) => {
    const val = e.target.value;
    setComment(val);
    // Open the picker when the caret is right after an "@token" at the end of input
    const m = val.match(/@(\w*)$/);
    if (m) { setMentionOpen(true); setMentionQuery(m[1]); }
    else { setMentionOpen(false); setMentionQuery(''); }
  };

  const pickMention = (name) => {
    const next = comment.replace(/@(\w*)$/, '@' + name + ' ');
    setComment(next);
    setMentionOpen(false); setMentionQuery('');
    if (commentRef.current) commentRef.current.focus();
  };

  const addComment = async () => {
    if (!comment.trim() || sending) return;
    setSending(true);
    const body = comment.trim();
    const mentionNames = detectMentions(body);

    const { data: inserted } = await supabase.from('comments')
      .insert({ item_id: item.id, user_id: currentUserId, user_name: currentUserName, body, mentions: mentionNames })
      .select().single();

    // Build in-app notifications for everyone mentioned (except myself)
    const recipients = profiles.filter(p =>
      mentionNames.includes(p.name) && p.id !== currentUserId);

    if (recipients.length) {
      const snippet = body.length > 140 ? body.slice(0, 140) + '…' : body;
      await supabase.from('notifications').insert(recipients.map(r => ({
        recipient_id: r.id, actor_id: currentUserId, actor_name: currentUserName,
        item_id: item.id, comment_id: inserted?.id || null, type: 'mention', body: snippet,
      })));
      // Fire-and-forget email (works once an email provider key is configured server-side)
      try {
        supabase.functions.invoke('notify-mention', { body: {
          recipient_ids: recipients.map(r => r.id),
          item_id: item.id, item_title: item.title,
          actor_name: currentUserName, body: snippet,
        }});
      } catch (e) { /* email is best-effort; in-app notification already saved */ }
    }

    setComment(''); setMentionOpen(false); setSending(false);
    loadComments();
  };

  // Render a comment body with @mentions highlighted
  const renderBody = (text) => {
    const parts = String(text).split(/(@\w+)/g);
    return parts.map((p, i) => {
      const isMention = /^@\w+$/.test(p) && FAMILY.some(f => '@' + f.name.toLowerCase() === p.toLowerCase());
      return isMention
        ? <span key={i} className="text-accent font-semibold">{p}</span>
        : <span key={i}>{p}</span>;
    });
  };

  const saveTags = async () => {
    await supabase.from('item_rooms').delete().eq('item_id', item.id);
    await supabase.from('item_categories').delete().eq('item_id', item.id);
    if (selectedRooms.length) {
      await supabase.from('item_rooms').insert(selectedRooms.map(rid => ({ item_id: item.id, room_id: rid })));
    }
    if (selectedCats.length) {
      await supabase.from('item_categories').insert(selectedCats.map(cid => ({ item_id: item.id, category_id: cid })));
    }
    setEditTags(false);
  };

  const saveTitle = async () => {
    await supabase.from('items').update({ title }).eq('id', item.id);
    item.title = title;
    setEditTitle(false);
  };

  // Soft delete: move the item to Trash (sets deleted_at). It disappears from the
  // grid/leaderboard but can be restored from the Trash page. Ratings/comments/tags
  // are preserved so a restore brings everything back intact.
  const deleteItem = async () => {
    if (!window.confirm(`Move "${item.title}" to Trash?\n\nIt'll be hidden from everyone but you can restore it from the Trash page anytime.`)) return;
    const { error } = await supabase.from('items').update({ deleted_at: new Date().toISOString() }).eq('id', item.id);
    if (error) { window.alert('Delete failed: ' + error.message); return; }
    onClose(); // parent's onClose clears the modal and reloads the list
  };

  // Tags auto-save: toggling a room/category persists immediately (no Save button).
  // Junction tables have composite PKs, so add uses upsert+ignoreDuplicates.
  const toggleRoom = async (rid) => {
    const has = selectedRooms.includes(rid);
    setSelectedRooms(prev => has ? prev.filter(x => x !== rid) : [...prev, rid]);
    item.room_ids = has ? (item.room_ids || []).filter(x => x !== rid) : [...(item.room_ids || []), rid];
    if (has) await supabase.from('item_rooms').delete().eq('item_id', item.id).eq('room_id', rid);
    else await supabase.from('item_rooms').upsert({ item_id: item.id, room_id: rid }, { onConflict: 'item_id,room_id', ignoreDuplicates: true });
  };
  const toggleCat = async (cid) => {
    const has = selectedCats.includes(cid);
    setSelectedCats(prev => has ? prev.filter(x => x !== cid) : [...prev, cid]);
    item.category_ids = has ? (item.category_ids || []).filter(x => x !== cid) : [...(item.category_ids || []), cid];
    if (has) await supabase.from('item_categories').delete().eq('item_id', item.id).eq('category_id', cid);
    else await supabase.from('item_categories').upsert({ item_id: item.id, category_id: cid }, { onConflict: 'item_id,category_id', ignoreDuplicates: true });
  };

  // Media element shown in the left pane. Reels/posts/youtube embed live;
  // unembeddable IG items show a fallback card; photos show the image. Everything
  // is sized to fit its frame (object-contain / capped widths).
  const eUrl = getEmbedUrl(item);
  const pUrl = item.content_type === 'photo' ? getPhotoUrl(item) : null;
  const mediaInner = (() => {
    if (eUrl && item.content_type === 'youtube') {
      return (
        <div className="w-full max-w-3xl aspect-video">
          <iframe src={eUrl} className="w-full h-full border-0 rounded-lg" allowFullScreen
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
            style={{background:'#000'}}/>
        </div>
      );
    }
    if (eUrl) {
      if (!item.thumbnail_url) {
        return (
          <div className="rounded-lg bg-dark-800 border border-dark-700 p-6 text-center space-y-2 max-w-md">
            <div className="text-3xl">🔒</div>
            <p className="text-sm text-dark-200 font-medium">This {item.content_type === 'instagram_reel' ? 'reel' : 'post'} can't be played here</p>
            <p className="text-xs text-dark-400">It's private, removed, or has embedding turned off on Instagram.</p>
            {item.url && (
              <a href={item.url.startsWith('http') ? item.url : '#'} target="_blank" rel="noopener noreferrer"
                className="inline-flex items-center gap-1.5 mt-1 text-accent hover:text-accent-light text-sm font-medium">
                ▶ Watch on Instagram ↗
              </a>
            )}
          </div>
        );
      }
      return (
        <div className="w-full max-w-[420px]">
          <InstaEmbed src={eUrl} type={item.content_type}/>
        </div>
      );
    }
    if (pUrl) return <img src={pUrl} alt={item.title} className="max-w-full max-h-[80vh] lg:max-h-full object-contain rounded-lg"/>;
    return <div className="text-dark-500 text-sm p-8">No preview available</div>;
  })();

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4 lg:p-0 backdrop-blur-sm" style={{backgroundColor:'var(--overlay)'}} onClick={onClose}>
      <div className="bg-dark-800 rounded-t-2xl sm:rounded-2xl lg:rounded-none max-w-2xl lg:max-w-none w-full lg:w-screen h-[92vh] sm:h-auto sm:max-h-[90vh] lg:h-screen lg:max-h-screen shadow-2xl sheet-anim flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
        {/* Header — full width across both layouts */}
        <div className="flex items-center justify-between p-4 border-b border-dark-700 bg-dark-800 z-10 flex-shrink-0">
          <div className="flex items-center gap-3 flex-1 min-w-0">
            <span className="text-2xl">{CONTENT_ICONS[item.content_type]}</span>
            {editTitle ? (
              <input autoFocus value={title} onChange={e => setTitle(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter') saveTitle();
                  else if (e.key === 'Escape') { setTitle(item.title); setEditTitle(false); }
                }}
                onBlur={saveTitle}
                className="flex-1 min-w-0 bg-dark-700 rounded-lg px-3 py-1.5 text-white text-lg font-bold focus:outline-none focus:ring-1 focus:ring-accent"/>
            ) : (
              <h2 className="font-bold text-lg flex items-center gap-2 min-w-0">
                <span className="truncate">{item.title}</span>
                <button onClick={() => setEditTitle(true)} aria-label="Rename" title="Rename"
                  className="text-dark-500 hover:text-accent text-sm flex-shrink-0">✏️</button>
              </h2>
            )}
          </div>
          <div className="flex items-center gap-3 ml-4 flex-shrink-0">
            <button onClick={deleteItem} title="Move to Trash"
              className="text-dark-400 hover:text-red-400 px-2.5 py-1.5 rounded-lg hover:bg-red-500/10 transition-colors text-sm">
              🗑 Trash
            </button>
            <button onClick={onClose} aria-label="Close"
              className="w-9 h-9 rounded-lg flex items-center justify-center text-2xl leading-none text-dark-400 hover:text-white hover:bg-dark-700 transition-colors">&times;</button>
          </div>
        </div>

        {/* BODY — single scroll on mobile; 3 columns on desktop: media | tags | rating+comments */}
        <div className="flex-1 min-h-0 overflow-y-auto lg:overflow-hidden grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_260px_340px] lg:grid-rows-[auto_minmax(0,1fr)]">

        {/* RATING — col 3 top (desktop) / first on mobile */}
        <div className="p-4 space-y-3 lg:col-start-3 lg:row-start-1 lg:border-l lg:border-dark-700">
          <div>
            <p className="text-[10px] uppercase tracking-wider text-dark-500 mb-1">Your rating</p>
            <StarRating rating={myRating} size="lg" onRate={(r) => onRate(item.id, r)}/>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {FAMILY.map(f => {
              const r = item.ratings?.find(r => r.user_name === f.name);
              return (
                <div key={f.name} className="flex items-center gap-2 p-2 bg-dark-700/50 rounded-lg">
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0"
                    style={{backgroundColor: f.color}}>{f.initials}</div>
                  <div className="min-w-0">
                    <p className="text-xs font-medium truncate">{f.name}</p>
                    <p className="text-[11px] font-semibold" style={{color: r ? f.color : '#64748b'}}>{r ? `${r.rating}★` : 'not yet'}</p>
                  </div>
                </div>
              );
            })}
          </div>
          {item.ratings?.length > 0 && (
            <div className="p-2 bg-accent/10 rounded-lg text-center">
              <span className="text-dark-300 text-xs">Average </span>
              <span className="text-base font-bold text-accent">★ {(item.ratings.reduce((s,r) => s+r.rating, 0) / item.ratings.length).toFixed(1)}</span>
            </div>
          )}
          {item.url && (
            <a href={item.url.startsWith('http') ? item.url : '#'} target="_blank" rel="noopener noreferrer"
              className="inline-flex items-center gap-2 text-accent hover:text-accent-light text-sm font-medium">
              🔗 Open original ↗
            </a>
          )}
        </div>

        {/* TAGS — col 2 full height (desktop) / second on mobile. Auto-saves on click, no Save button. */}
        <div className="p-4 space-y-4 lg:col-start-2 lg:row-start-1 lg:row-span-2 lg:border-l lg:border-dark-700 lg:overflow-y-auto">
          <div>
            <p className="text-xs uppercase tracking-wider text-dark-500 mb-2">Rooms</p>
            <div className="flex flex-wrap gap-1.5">
              {allRooms.map(r => (
                <button key={r.id} onClick={() => toggleRoom(r.id)}
                  className={`tag-pill ${selectedRooms.includes(r.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300 hover:bg-dark-600'}`}>
                  {r.icon} {r.name}
                </button>
              ))}
            </div>
          </div>
          <div>
            <p className="text-xs uppercase tracking-wider text-dark-500 mb-2">Categories</p>
            <div className="flex flex-wrap gap-1.5">
              {allCategories.map(c => (
                <button key={c.id} onClick={() => toggleCat(c.id)}
                  className={`tag-pill ${selectedCats.includes(c.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300 hover:bg-dark-600'}`}>
                  {c.icon} {c.name}
                </button>
              ))}
            </div>
          </div>
          <p className="text-[11px] text-dark-500">Tags save automatically as you tap.</p>
        </div>

        {/* MEDIA — col 1 full height (desktop), fills the width. Caption sits below the fold; scroll to reach it. */}
        <div className="bg-black relative flex flex-col items-center justify-start p-2 sm:p-3 lg:col-start-1 lg:row-start-1 lg:row-span-2 lg:h-full lg:overflow-y-auto">
          <button onClick={toggleFullscreen} aria-label="Toggle fullscreen"
            className="absolute top-3 right-3 z-10 w-9 h-9 rounded-lg bg-dark-900/70 hover:bg-dark-900 text-white flex items-center justify-center text-lg backdrop-blur-sm">
            {isFs ? '🗗' : '⛶'}
          </button>
          <div ref={mediaRef} className="media-fs w-full flex items-start justify-center">
            {mediaInner}
          </div>
        </div>

        {/* COMMENTS — col 3 lower (desktop) / last on mobile */}

// ─── LEADERBOARD VIEW ──────────────────────────────────────────
// Consensus-weighted scoring. A 4.5 agreed by all four beats a lone 5★.
// Bayesian average pulls thin-vote items toward the neutral mean (3), then a
// small agreement bonus rewards low spread. Returns enriched item + signals.
const LB_PRIOR_MEAN = 3, LB_PRIOR_WEIGHT = 2;
function scoreLeaderboardItem(item) {
  const rs = (item.ratings || []).filter(r => r.rating > 0);
  const n = rs.length;
  const sum = rs.reduce((s, r) => s + r.rating, 0);
  const avg = n ? sum / n : 0;
  const bayes = (sum + LB_PRIOR_MEAN * LB_PRIOR_WEIGHT) / (n + LB_PRIOR_WEIGHT);
  const variance = n ? rs.reduce((s, r) => s + (r.rating - avg) ** 2, 0) / n : 0;
  const stdev = Math.sqrt(variance);
  const agreement = n >= 2 ? Math.max(0, 1 - stdev / 2) : 0.5;
  const score = bayes + 0.3 * agreement;
  const ratingByName = {};
  rs.forEach(r => { ratingByName[r.user_name] = r.rating; });
  const ratings = rs.map(r => r.rating);
  const spread = n >= 2 ? Math.max(...ratings) - Math.min(...ratings) : 0;
  const minR = n ? Math.min(...ratings) : 0;
  return {
    ...item, n, avg, bayes, stdev, agreement, score, spread, ratingByName,
    familyFavorite: n === FAMILY.length && minR >= 4,
    contested: n >= 3 && spread >= 2,
    needsVotes: n < FAMILY.length,
  };
}

              className={`absolute rounded border flex flex-col items-center justify-center text-center px-0.5 transition-all ${active ? 'bg-accent text-white border-accent z-10 shadow-lg scale-[1.02]' : 'bg-[#d8cfc0] hover:bg-accent/30 text-[#433b2e] border-[#b9b0a0] hover:border-accent'}`}
              style={{ left: h.l + '%', top: h.t + '%', width: h.w + '%', height: h.h + '%' }}>
              <span className="text-[8px] sm:text-[10px] font-bold leading-tight">{label}</span>

            </div>

        {/* DETAIL PANEL — right on desktop / below on mobile */}
