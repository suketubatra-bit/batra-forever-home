function LeaderboardView({ items, rooms, categories, decisions, onClose, onOpenDetail, onSetWinner, onClearWinner }) {
  const roomsWithItems = rooms.filter(r => items.some(it => it.room_ids.includes(r.id)));
  const [activeRoom, setActiveRoom] = useState(roomsWithItems[0]?.id ?? null);
  const [expanded, setExpanded] = useState({}); // categoryId -> show all

  const room = rooms.find(r => r.id === activeRoom);
  const roomItems = items.filter(it => it.room_ids.includes(activeRoom));

  // Category sections present in this room, plus an Uncategorized bucket.
  const catGroups = categories
    .map(cat => ({ cat, list: roomItems.filter(it => it.category_ids.includes(cat.id)) }))
    .filter(g => g.list.length > 0);
  const uncategorized = roomItems.filter(it => it.category_ids.length === 0);

  const decidedCount = catGroups.filter(g => decisions[`${activeRoom}-${g.cat.id}`]).length;

  const buildSection = (list) => {
    const scored = list.map(scoreLeaderboardItem).sort((a, b) => b.score - a.score || b.n - a.n);
    const topByPerson = {}; // person name -> winning itemId within this group
    FAMILY.forEach(f => {
      let best = null, bestR = 0;
      scored.forEach(it => {
        const r = it.ratingByName[f.name];
        if (r && r > bestR) { bestR = r; best = it.id; }
      });
      if (best) topByPerson[f.name] = best;
    });
    return { scored, topByPerson };
  };

  const Badge = ({ color, bg, children }) => (
    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full whitespace-nowrap"
      style={{ color, backgroundColor: bg }}>{children}</span>
  );

  const ItemRow = ({ it, rank, isWinner, catId, topByPerson }) => {
    const thumb = getThumbUrl(it);
    return (
      <div className={`glass rounded-xl p-3 flex items-center gap-3 ${isWinner ? 'border border-amber-400/60' : ''}`}>
        <span className="w-7 text-center flex-shrink-0">
          {isWinner ? <span className="text-lg">👑</span>
            : <span className="text-sm font-bold text-dark-400">#{rank}</span>}
        </span>
        <button onClick={() => onOpenDetail && onOpenDetail(it)}
          className="w-12 h-12 rounded-lg bg-dark-700 flex items-center justify-center flex-shrink-0 overflow-hidden">
          {thumb ? <img src={thumb} alt="" loading="lazy" className="w-full h-full object-cover"/>
            : <span>{CONTENT_ICONS[it.content_type]}</span>}
        </button>
        <div className="flex-1 min-w-0">
          <button onClick={() => onOpenDetail && onOpenDetail(it)} className="text-left w-full">
            <h4 className="font-medium text-sm truncate hover:text-accent transition-colors">{it.title}</h4>
          </button>
          <div className="flex flex-wrap items-center gap-1.5 mt-1">
            {isWinner && <Badge color="#78350f" bg="#fbbf24">Winner</Badge>}
            {it.familyFavorite && <Badge color="#831843" bg="#fbcfe8">💖 Family fave</Badge>}
            {it.contested && <Badge color="#7c2d12" bg="#fed7aa">⚡ Contested</Badge>}
            {it.needsVotes && <Badge color="#1e3a5f" bg="#bae6fd">🗳 Needs votes</Badge>}
          </div>
          <div className="flex flex-wrap gap-1.5 mt-1">
            {FAMILY.map(f => {
              const r = it.ratingByName[f.name];
              const isTop = topByPerson[f.name] === it.id;
              if (!r) return (
                <span key={f.name} className="text-[11px] text-dark-500" title={`${f.name} hasn't voted`}>
                  {f.initials}:–
                </span>
              );
              return (
                <span key={f.name} className="text-[11px] font-medium inline-flex items-center gap-0.5"
                  style={{ color: f.color }} title={`${f.name}: ${r}★${isTop ? ' — their top pick here' : ''}`}>
                  {isTop && <span>⭐</span>}{f.initials}:{r}★
                </span>
              );
            })}
          </div>
        </div>
        <div className="flex flex-col items-end gap-1 flex-shrink-0">
          <div className="text-right">
            <p className="text-lg font-bold text-accent leading-none">★ {it.n ? it.avg.toFixed(1) : '–'}</p>
            <p className="text-[10px] text-dark-400">{it.n} {it.n === 1 ? 'vote' : 'votes'}</p>
          </div>
          {catId != null && (isWinner ? (
            <button onClick={() => onClearWinner(activeRoom, catId)}
              className="text-[10px] text-dark-400 hover:text-white underline">Unset</button>
          ) : (
            <button onClick={() => onSetWinner(activeRoom, catId, it.id)}
              className="text-[10px] px-2 py-0.5 rounded-full bg-dark-700 hover:bg-amber-400/20 text-dark-200 hover:text-amber-300 transition-colors">
              Make winner
            </button>
          ))}
        </div>
      </div>
    );
  };

  const Section = ({ cat, list }) => {
    const catId = cat ? cat.id : null;
    const { scored, topByPerson } = buildSection(list);
    const winnerId = catId != null ? decisions[`${activeRoom}-${catId}`]?.item_id : null;
    const winnerName = catId != null ? decisions[`${activeRoom}-${catId}`]?.decided_by_name : null;
    const winner = winnerId ? scored.find(s => s.id === winnerId) : null;
    const rest = scored.filter(s => s.id !== winnerId);
    const isOpen = expanded[catId == null ? 'uncat' : catId];
    const shown = isOpen ? rest : rest.slice(0, 5);

    return (
      <div className="mb-6">
        <div className="flex items-center justify-between mb-2 px-1">
          <h3 className="font-display text-base text-dark-100 flex items-center gap-2">
            <span>{cat ? (cat.icon || '🏷') : '📭'}</span>
            {cat ? cat.name : 'Uncategorized'}
            <span className="text-xs text-dark-500 font-sans">{list.length}</span>
          </h3>
          {winner && <span className="text-[11px] text-amber-300">👑 decided{winnerName ? ` · ${winnerName}` : ''}</span>}
        </div>
        <div className="space-y-2">
          {winner && <ItemRow it={winner} isWinner catId={catId} topByPerson={topByPerson}/>}
          {shown.map((it, i) => (
            <ItemRow key={it.id} it={it} rank={i + 1} catId={catId} topByPerson={topByPerson}/>
          ))}
        </div>
        {rest.length > 5 && (
          <button onClick={() => setExpanded(e => ({ ...e, [catId == null ? 'uncat' : catId]: !isOpen }))}
            className="text-xs text-accent mt-2 px-1 hover:underline">
            {isOpen ? 'Show less' : `Show ${rest.length - 5} more`}
          </button>
        )}
      </div>
    );
  };

  return (
    <div className="fixed inset-0 z-40 bg-dark-900/95 backdrop-blur-sm overflow-y-auto p-4" onClick={onClose}>
      <div className="max-w-2xl mx-auto pb-12" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-1 sticky top-0 -mx-4 px-4 py-2 bg-dark-900/90 backdrop-blur-sm z-10">
          <h2 className="font-display text-2xl text-accent">🏆 Leaderboard</h2>
          <button onClick={onClose} className="text-dark-400 hover:text-white text-2xl" aria-label="Close">&times;</button>
        </div>
        <p className="text-xs text-dark-400 mb-4">Top picks per room &amp; category, ranked by family consensus — more votes and closer agreement rank higher. Mark a winner once you've decided.</p>

        {roomsWithItems.length === 0 ? (
          <p className="text-dark-400 text-center py-12">No items have been tagged to a room yet. Tag items by room to build the leaderboard.</p>
        ) : (
          <>
            {/* Room selector */}
            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-4 -mx-1 px-1">
              {roomsWithItems.map(r => {
                const cnt = items.filter(it => it.room_ids.includes(r.id)).length;
                const dec = categories.filter(c => decisions[`${r.id}-${c.id}`]).length;
                return (
                  <button key={r.id} onClick={() => setActiveRoom(r.id)}
                    className={`fpill flex-shrink-0 ${activeRoom === r.id ? 'active' : ''}`}>
                    {r.icon || '🏠'} {r.name} <span className="cnt">{cnt}</span>
                    {dec > 0 && <span className="ml-1 text-amber-300">👑{dec}</span>}
                  </button>
                );
              })}
            </div>

            {/* Room summary + decided/undecided progress */}
            <div className="mb-5 px-1">
              <div className="flex items-center justify-between text-xs text-dark-400 mb-1.5">
                <span className="text-dark-200 font-medium">{room?.name}</span>
                <span className="text-amber-300">
                  {decidedCount} of {catGroups.length} categor{catGroups.length === 1 ? 'y' : 'ies'} decided
                </span>
              </div>
              <div className="h-1.5 rounded-full bg-dark-700 overflow-hidden">
                <div className="h-full bg-amber-400 rounded-full transition-all duration-300"
                  style={{ width: `${catGroups.length ? (decidedCount / catGroups.length) * 100 : 0}%` }}/>
              </div>
            </div>

            {catGroups.length === 0 && uncategorized.length === 0 ? (
              <p className="text-dark-400 text-center py-8">No items in this room yet.</p>
            ) : (
              <>
                {catGroups.map(g => <Section key={g.cat.id} cat={g.cat} list={g.list}/>)}
                {uncategorized.length > 0 && <Section cat={null} list={uncategorized}/>}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── ADD ITEM MODAL ────────────────────────────────────────────
function AddItemModal({ onClose, supabase, rooms, categories, onAdded }) {
  const [title, setTitle] = useState('');
  const [url, setUrl] = useState('');
  const [contentType, setContentType] = useState('website');
  const [selectedRooms, setSelectedRooms] = useState([]);
  const [selectedCats, setSelectedCats] = useState([]);
  const [loading, setLoading] = useState(false);
  const [preview, setPreview] = useState(null);   // {title, image} from unfurl
  const [unfurling, setUnfurling] = useState(false);
  const autoTitled = useRef(false);               // did we auto-fill the title?
  const unfurlTimer = useRef(null);

  const detectType = (url) => {
    if (url.includes('instagram.com/reel')) return 'instagram_reel';
    if (url.includes('instagram.com/p/')) return 'instagram_post';
    if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
    return 'website';
  };

  // Fetch a link preview (og:image + title) for website links, debounced.
  const fetchPreview = async (u) => {
    setUnfurling(true);
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/unfurl?url=${encodeURIComponent(u)}`, {
        headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
      });
      const data = await res.json();
      if (data && (data.image || data.title)) {
        setPreview({ title: data.title, image: data.image });
        // Auto-fill the title if the user hasn't typed one (or we filled it before).
        if (data.title && (!title.trim() || autoTitled.current)) {
          setTitle(data.title.slice(0, 200));
          autoTitled.current = true;
        }
      } else setPreview(null);
    } catch (e) { setPreview(null); }
    setUnfurling(false);
  };

  const handleUrlChange = (val) => {
    setUrl(val);
    const type = val ? detectType(val) : 'website';
    if (val) setContentType(type);
    setPreview(null);
    if (unfurlTimer.current) clearTimeout(unfurlTimer.current);
    // Only unfurl real website links (IG/YouTube get their own thumbnails).
    if (type === 'website' && /^https?:\/\/.+\..+/.test(val.trim())) {
      unfurlTimer.current = setTimeout(() => fetchPreview(val.trim()), 600);
    }
  };

  const handleSubmit = async () => {
    if (!title.trim()) return;
    setLoading(true);
    const { data: profile } = await supabase.auth.getUser();
    const { data: prof } = await supabase.from('profiles').select('name').eq('id', profile.user.id).single();

    const { data: item, error } = await supabase.from('items').insert({
      title, url: url || null, content_type: contentType,
      added_by: profile.user.id, added_by_name: prof?.name || 'Unknown'
    }).select().single();

    if (item) {
      if (selectedRooms.length) {
        await supabase.from('item_rooms').insert(selectedRooms.map(rid => ({ item_id: item.id, room_id: rid })));
      }
      if (selectedCats.length) {
        await supabase.from('item_categories').insert(selectedCats.map(cid => ({ item_id: item.id, category_id: cid })));
      }
      // Auto-fetch a static grid thumbnail for Instagram items. YouTube/photos
      // derive their thumbnail client-side, so they need no server call.
      if (contentType === 'instagram_reel' || contentType === 'instagram_post') {
        try {
          await fetch(`${SUPABASE_URL}/functions/v1/backfill-thumbs?limit=25`, {
            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
          });
        } catch (e) { /* thumbnail is best-effort; item is already saved */ }
      } else if (contentType === 'website' && url) {
        // Auto-unfurl: scrape og:image server-side and store it as the thumbnail.
        try {
          await fetch(`${SUPABASE_URL}/functions/v1/unfurl?item_id=${item.id}`, {
            headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
          });
        } catch (e) { /* preview is best-effort; item is already saved */ }
      }
    }
    setLoading(false);
    onAdded();
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm" style={{backgroundColor:'var(--overlay)'}} onClick={onClose}>
      <div className="bg-dark-800 rounded-t-2xl sm:rounded-2xl max-w-lg w-full max-h-[92vh] overflow-y-auto p-6 space-y-4 sheet-anim" onClick={e => e.stopPropagation()}>
        <h2 className="font-display text-xl text-accent">Add Inspiration</h2>

        <div>
          <label className="block text-sm text-dark-300 mb-1">Title *</label>
          <input value={title} onChange={e => setTitle(e.target.value)}
            placeholder="e.g. Modern kitchen island design"
            className="w-full bg-dark-700 rounded-lg px-3 py-2 text-white placeholder-dark-500 focus:outline-none focus:ring-1 focus:ring-accent"/>
        </div>

        <div>
          <label className="block text-sm text-dark-300 mb-1">URL (optional)</label>
          <input value={url} onChange={e => handleUrlChange(e.target.value)}
            placeholder="https://..."
            className="w-full bg-dark-700 rounded-lg px-3 py-2 text-white placeholder-dark-500 focus:outline-none focus:ring-1 focus:ring-accent"/>
          {unfurling && (
            <p className="text-xs text-dark-400 mt-1.5 flex items-center gap-1.5">
              <span className="inline-block w-3 h-3 border-2 border-dark-500 border-t-accent rounded-full animate-spin"></span>
              Fetching preview…
            </p>
          )}
          {preview && (preview.image || preview.title) && (
            <div className="mt-2 flex gap-3 items-center bg-dark-900 rounded-lg p-2 border border-dark-700">
              {preview.image
                ? <img src={preview.image} alt="" className="w-16 h-16 rounded-md object-cover flex-shrink-0" onError={e => { e.target.style.display='none'; }}/>
                : <div className="w-16 h-16 rounded-md bg-dark-700 flex items-center justify-center flex-shrink-0 text-2xl">🌐</div>}
              <div className="min-w-0">
                <p className="text-sm text-dark-100 font-medium truncate">{preview.title || 'Link preview'}</p>
                <p className="text-xs text-dark-400">{preview.image ? 'Image preview will be saved' : 'No image found — link saved without preview'}</p>
              </div>
            </div>
          )}
        </div>

        <div>
          <label className="block text-sm text-dark-300 mb-1">Type</label>
          <select value={contentType} onChange={e => setContentType(e.target.value)}
            className="w-full bg-dark-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-1 focus:ring-accent">
            {Object.entries(CONTENT_ICONS).map(([k,v]) => (
              <option key={k} value={k}>{v} {k.replace('_',' ')}</option>
            ))}
          </select>
        </div>

        <div>
          <p className="text-sm text-dark-300 mb-1">Rooms</p>
          <div className="flex flex-wrap gap-1">
            {rooms.map(r => (
              <button key={r.id}
                onClick={() => setSelectedRooms(prev => prev.includes(r.id) ? prev.filter(x=>x!==r.id) : [...prev, r.id])}
                className={`tag-pill ${selectedRooms.includes(r.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300'}`}>
                {r.icon} {r.name}
              </button>
            ))}
          </div>
        </div>

        <div>
          <p className="text-sm text-dark-300 mb-1">Categories</p>
          <div className="flex flex-wrap gap-1">
            {categories.map(c => (
              <button key={c.id}
                onClick={() => setSelectedCats(prev => prev.includes(c.id) ? prev.filter(x=>x!==c.id) : [...prev, c.id])}
                className={`tag-pill ${selectedCats.includes(c.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300'}`}>
                {c.icon} {c.name}
              </button>
            ))}
          </div>
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="flex-1 bg-dark-700 hover:bg-dark-600 text-dark-200 py-2.5 rounded-lg font-medium transition-colors">Cancel</button>
          <button onClick={handleSubmit} disabled={!title.trim() || loading}
            className="flex-1 bg-accent hover:bg-accent-dark disabled:opacity-40 text-white py-2.5 rounded-lg font-bold transition-colors">
            {loading ? 'Adding...' : 'Add Item'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── BATCH TAG MODAL ───────────────────────────────────────────
function BatchTagModal({ itemIds, allRooms, allCategories, supabase, onClose, onDone }) {
  const [selectedRooms, setSelectedRooms] = useState([]);
  const [selectedCats, setSelectedCats] = useState([]);
  const [mode, setMode] = useState('add'); // 'add' | 'replace'
  const [saving, setSaving] = useState(false);

  const nothingPicked = selectedRooms.length === 0 && selectedCats.length === 0;

  const apply = async () => {
    if (nothingPicked) return;
    setSaving(true);
    const roomRows = itemIds.flatMap(id => selectedRooms.map(rid => ({ item_id: id, room_id: rid })));
    const catRows  = itemIds.flatMap(id => selectedCats.map(cid => ({ item_id: id, category_id: cid })));

    if (mode === 'replace') {
      await supabase.from('item_rooms').delete().in('item_id', itemIds);
      await supabase.from('item_categories').delete().in('item_id', itemIds);
    }
    if (roomRows.length) {
      await supabase.from('item_rooms').upsert(roomRows, { onConflict: 'item_id,room_id', ignoreDuplicates: true });
    }
    if (catRows.length) {
      await supabase.from('item_categories').upsert(catRows, { onConflict: 'item_id,category_id', ignoreDuplicates: true });
    }
    setSaving(false);
    onDone();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm" style={{backgroundColor:'var(--overlay)'}} onClick={onClose}>
      <div className="bg-dark-800 rounded-t-2xl sm:rounded-2xl max-w-lg w-full max-h-[92vh] overflow-y-auto p-6 space-y-4 sheet-anim" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <h2 className="font-display text-xl text-accent">Tag {itemIds.length} item{itemIds.length === 1 ? '' : 's'}</h2>
          <button onClick={onClose} className="text-dark-400 hover:text-white text-2xl">&times;</button>
        </div>

        {/* Mode */}
        <div className="flex bg-dark-900 rounded-lg p-1 text-sm">
          <button onClick={() => setMode('add')}
            className={`flex-1 py-2 rounded-md font-medium transition-colors ${mode === 'add' ? 'bg-accent text-white' : 'text-dark-400'}`}>
            ➕ Add to existing
          </button>
          <button onClick={() => setMode('replace')}
            className={`flex-1 py-2 rounded-md font-medium transition-colors ${mode === 'replace' ? 'bg-accent text-white' : 'text-dark-400'}`}>
            ♻️ Replace all
          </button>
        </div>
        <p className="text-xs text-dark-500 -mt-2">
          {mode === 'add'
            ? 'Adds the chosen tags to every selected item, keeping their current tags.'
            : 'Clears existing room & category tags on the selected items, then applies exactly what you pick here.'}
        </p>

        <div>
          <p className="text-sm text-dark-300 mb-1">Rooms</p>
          <div className="flex flex-wrap gap-1">
            {allRooms.map(r => (
              <button key={r.id}
                onClick={() => setSelectedRooms(prev => prev.includes(r.id) ? prev.filter(x=>x!==r.id) : [...prev, r.id])}
                className={`tag-pill ${selectedRooms.includes(r.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300 hover:bg-dark-600'}`}>
                {r.icon} {r.name}
              </button>
            ))}
          </div>
        </div>

        <div>
          <p className="text-sm text-dark-300 mb-1">Categories</p>
          <div className="flex flex-wrap gap-1">
            {allCategories.map(c => (
              <button key={c.id}
                onClick={() => setSelectedCats(prev => prev.includes(c.id) ? prev.filter(x=>x!==c.id) : [...prev, c.id])}
                className={`tag-pill ${selectedCats.includes(c.id) ? 'bg-accent text-white' : 'bg-dark-700 text-dark-300 hover:bg-dark-600'}`}>
                {c.icon} {c.name}
              </button>
            ))}
          </div>
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="flex-1 bg-dark-700 hover:bg-dark-600 text-dark-200 py-2.5 rounded-lg font-medium transition-colors">Cancel</button>
          <button onClick={apply} disabled={nothingPicked || saving}
            className="flex-1 bg-accent hover:bg-accent-dark disabled:opacity-40 text-white py-2.5 rounded-lg font-bold transition-colors">
            {saving ? 'Applying...' : `Apply to ${itemIds.length}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── THEME SWITCHER ────────────────────────────────────────────
function ThemeSwitcher() {
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState(() => { try { return localStorage.getItem('bh_theme') || 'dark'; } catch(e){ return 'dark'; } });
  const [accent, setAccent] = useState(() => { try { return localStorage.getItem('bh_accent') || 'orange'; } catch(e){ return 'orange'; } });
  const ref = useRef(null);

  useEffect(() => {
    document.documentElement.classList.toggle('theme-light', mode === 'light');
    try { localStorage.setItem('bh_theme', mode); } catch(e){}
  }, [mode]);
  useEffect(() => {
    document.documentElement.setAttribute('data-accent', accent);
    try { localStorage.setItem('bh_accent', accent); } catch(e){}
  }, [accent]);
  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const ACCENTS = [
    {key:'orange',c:'#f97316'},{key:'blue',c:'#3b82f6'},{key:'pink',c:'#ec4899'},
    {key:'teal',c:'#14b8a6'},{key:'green',c:'#22c55e'},{key:'violet',c:'#8b5cf6'},{key:'rose',c:'#f43f5e'}
  ];

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)} title="Theme & colours"
        className="w-9 h-9 rounded-full glass flex items-center justify-center text-lg hover:scale-105 transition-transform">
        {mode === 'light' ? '🌞' : '🌙'}
      </button>
      {open && (
        <div className="absolute right-0 mt-2 w-60 glass rounded-2xl p-4 shadow-2xl z-50 fade-in">
          <p className="text-[10px] uppercase tracking-widest text-dark-500 mb-2">Appearance</p>
          <div className="flex bg-dark-900/50 rounded-lg p-1 mb-4">
            <button onClick={() => setMode('dark')}
              className={`flex-1 py-1.5 rounded-md text-sm font-medium transition-colors ${mode==='dark'?'bg-accent text-white':'text-dark-400'}`}>🌙 Dark</button>
            <button onClick={() => setMode('light')}
              className={`flex-1 py-1.5 rounded-md text-sm font-medium transition-colors ${mode==='light'?'bg-accent text-white':'text-dark-400'}`}>🌞 Daylight</button>
          </div>
          <p className="text-[10px] uppercase tracking-widest text-dark-500 mb-2">Accent colour</p>
          <div className="flex flex-wrap gap-2.5">
            {ACCENTS.map(a => (
              <button key={a.key} onClick={() => setAccent(a.key)} title={a.key}
                className="w-7 h-7 rounded-full transition-transform hover:scale-110"
                style={{backgroundColor:a.c, outline: accent===a.key ? '2px solid '+a.c : 'none', outlineOffset:'2px', transform: accent===a.key?'scale(1.1)':'none'}}/>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── NOTIFICATION BELL ─────────────────────────────────────────
function NotificationBell({ supabase, userId, items, onOpenItem }) {
  const [notes, setNotes] = useState([]);
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  const load = useCallback(async () => {
    const { data } = await supabase.from('notifications').select('*')
      .eq('recipient_id', userId).order('created_at', { ascending: false }).limit(40);
    setNotes(data || []);
  }, [supabase, userId]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const ch = supabase.channel('realtime-notifications-' + userId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications', filter: `recipient_id=eq.${userId}` }, load)
      .subscribe();
    return () => supabase.removeChannel(ch);
  }, [supabase, userId, load]);
  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const unread = notes.filter(n => !n.read).length;

  const openNote = async (n) => {
    if (!n.read) await supabase.from('notifications').update({ read: true }).eq('id', n.id);
    setOpen(false);
    const it = items.find(i => i.id === n.item_id);
    if (it) onOpenItem(it);
    load();
  };
  const markAll = async () => {
    await supabase.from('notifications').update({ read: true }).eq('recipient_id', userId).eq('read', false);
    load();
  };

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)} title="Notifications"
        className="relative w-9 h-9 rounded-full glass flex items-center justify-center text-lg hover:scale-105 transition-transform">
        🔔
        {unread > 0 && (
          <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center">
            {unread > 9 ? '9+' : unread}
          </span>
        )}
      </button>
      {open && (
        <div className="absolute right-0 mt-2 w-80 max-w-[88vw] glass rounded-2xl shadow-2xl z-50 fade-in overflow-hidden">
          <div className="flex items-center justify-between px-4 py-2.5 border-b border-dark-700">
            <span className="font-semibold text-sm">Notifications</span>
            {unread > 0 && <button onClick={markAll} className="text-accent text-xs font-medium">Mark all read</button>}
          </div>
          <div className="max-h-96 overflow-y-auto">
            {notes.length === 0 ? (
              <p className="text-dark-500 text-sm text-center py-8">No notifications yet</p>
            ) : notes.map(n => {
              const it = items.find(i => i.id === n.item_id);
              const color = FAMILY.find(f => f.name === n.actor_name)?.color || '#94a3b8';
              return (
                <button key={n.id} onClick={() => openNote(n)}
                  className={`w-full text-left px-4 py-3 border-b border-dark-700/60 hover:bg-dark-700/50 transition-colors flex gap-3 ${!n.read ? 'bg-accent/5' : ''}`}>
                  <span className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0" style={{backgroundColor: color}}>
                    {(n.actor_name || '?').substring(0,2).toUpperCase()}
                  </span>
                  <div className="min-w-0 flex-1">
                    <p className="text-sm text-dark-100"><span className="font-semibold">{n.actor_name}</span> tagged you{it ? ` on “${it.title}”` : ''}</p>
                    {n.body && <p className="text-xs text-dark-400 truncate mt-0.5">{n.body}</p>}
                    <p className="text-[10px] text-dark-500 mt-0.5">{new Date(n.created_at).toLocaleString()}</p>
                  </div>
                  {!n.read && <span className="w-2 h-2 rounded-full bg-accent flex-shrink-0 mt-1.5"/>}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────
function MainApp({ supabase }) {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [items, setItems] = useState([]);
  const [rooms, setRooms] = useState([]);
  const [categories, setCategories] = useState([]);
  const [allProfiles, setAllProfiles] = useState([]);
  const [decisions, setDecisions] = useState({}); // `${roomId}-${catId}` -> {item_id, decided_by_name}
  const [trashed, setTrashed] = useState([]); // soft-deleted items (deleted_at set)
  const [showTrash, setShowTrash] = useState(false);
  const [showFloorPlan, setShowFloorPlan] = useState(false);
  const [loading, setLoading] = useState(true);
  const [filtersOpen, setFiltersOpen] = useState(false); // mobile collapse

  // Filters
  const [filterRoom, setFilterRoom] = useState(null);
  const [filterCategory, setFilterCategory] = useState(null);
  const [filterType, setFilterType] = useState(null);
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('newest');

  // UI state
  const [selectedItems, setSelectedItems] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const [showLeaderboard, setShowLeaderboard] = useState(false);
  const [showAddItem, setShowAddItem] = useState(false);
  const [detailItem, setDetailItem] = useState(null);
  const [view, setView] = useState('grid'); // grid | list

  // Batch-tag selection
  const [selectMode, setSelectMode] = useState(false);
  const [tagSelection, setTagSelection] = useState([]);
  const [showBatchTag, setShowBatchTag] = useState(false);

  // Lock background scroll whenever any full-screen overlay/modal is open, so
  // the grid beneath doesn't scroll behind it.
  const anyModalOpen = !!(detailItem || showCompare || showLeaderboard || showFloorPlan || showTrash || showAddItem || showBatchTag);
  useEffect(() => {
    document.body.style.overflow = anyModalOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [anyModalOpen]);

  useEffect(() => {
    let loadedOnce = false;
    // onAuthStateChange fires INITIAL_SESSION with the current session on
    // subscribe, so it replaces a separate getSession() call. We deliberately
    // IGNORE TOKEN_REFRESHED / USER_UPDATED — those fire on every window-focus
    // and token rotation, and were causing the whole page to reload (and jump
    // to top) whenever you scrolled away and came back.
    const { data: sub } = supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') return;
      setUser(session?.user || null);
      if (session?.user) {
        loadProfile(session.user.id);
        loadData(loadedOnce);   // first load shows skeleton; any later one is silent
        loadedOnce = true;
      } else {
        setLoading(false);
      }
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  // Realtime subscription for ratings (keyed on user id so it doesn't
  // resubscribe when the session object identity changes on token refresh)
  useEffect(() => {
    if (!user?.id) return;
    const channel = supabase.channel('realtime-ratings')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'ratings' }, () => {
        loadData(true);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'decisions' }, () => {
        loadData(true);
      })
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, [user?.id]);

  const loadProfile = async (userId) => {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
    setProfile(data);
  };

  // silent=true keeps the grid mounted (no skeleton swap) so scroll position is
  // preserved when a modal closes or a rating/comment triggers a refresh.
  const loadData = async (silent = false) => {
    if (!silent) setLoading(true);
    const [roomsRes, catsRes, itemsRes, ratingsRes, itemRoomsRes, itemCatsRes, profilesRes, decisionsRes] = await Promise.all([
      supabase.from('rooms').select('*').order('display_order'),
      supabase.from('categories').select('*').order('display_order'),
      supabase.from('items').select('*').order('created_at', { ascending: false }),
      supabase.from('ratings').select('*, profiles(name)'),
      supabase.from('item_rooms').select('*'),
      supabase.from('item_categories').select('*'),
      supabase.from('profiles').select('id, name, avatar_color'),
      supabase.from('decisions').select('*'),
    ]);

    setRooms(roomsRes.data || []);
    setCategories(catsRes.data || []);
    setAllProfiles(profilesRes.data || []);

    const decisionsMap = {};
    (decisionsRes.data || []).forEach(d => {
      decisionsMap[`${d.room_id}-${d.category_id}`] = { item_id: d.item_id, decided_by_name: d.decided_by_name };
    });
    setDecisions(decisionsMap);

    const ratingsMap = {};
    (ratingsRes.data || []).forEach(r => {
      if (!ratingsMap[r.item_id]) ratingsMap[r.item_id] = [];
      ratingsMap[r.item_id].push({ ...r, user_name: r.profiles?.name });
    });

    const roomsMap = {};
    (itemRoomsRes.data || []).forEach(ir => {
      if (!roomsMap[ir.item_id]) roomsMap[ir.item_id] = [];
      roomsMap[ir.item_id].push(ir.room_id);
    });

    const catsMap = {};
    (itemCatsRes.data || []).forEach(ic => {
      if (!catsMap[ic.item_id]) catsMap[ic.item_id] = [];
      catsMap[ic.item_id].push(ic.category_id);
    });

    const enrichedItems = (itemsRes.data || []).map(item => ({
      ...item,
      ratings: ratingsMap[item.id] || [],
      room_ids: roomsMap[item.id] || [],
      category_ids: catsMap[item.id] || [],
    }));

    // Soft delete: items with deleted_at live in the Trash, hidden from the
    // grid/leaderboard/filters until restored or permanently removed.
    setItems(enrichedItems.filter(i => !i.deleted_at));
    setTrashed(enrichedItems.filter(i => i.deleted_at)
      .sort((a, b) => new Date(b.deleted_at) - new Date(a.deleted_at)));
    if (!silent) setLoading(false);
  };

  // Deep-link: open an item if the URL has ?item=<id> (used by email links)
  const deepLinkedRef = useRef(false);
  useEffect(() => {
    if (deepLinkedRef.current || !items.length) return;
    const id = new URLSearchParams(window.location.search).get('item');
    if (id) {
      const it = items.find(i => i.id === id);
      if (it) { setDetailItem(it); deepLinkedRef.current = true; }
    }
  }, [items]);

  const handleRate = async (itemId, rating) => {
    if (!user?.id) return;
    // 1) Optimistic update everywhere so the star fills instantly and never appears
    //    to "not save" — applied to both the grid item and the open modal item.
    const applyLocal = (it) => {
      if (!it || it.id !== itemId) return it;
      const others = (it.ratings || []).filter(r => r.user_id !== user.id);
      return { ...it, ratings: [...others, { item_id: itemId, user_id: user.id, rating, user_name: profile?.name }] };
    };
    setItems(prev => prev.map(applyLocal));
    setDetailItem(prev => applyLocal(prev));

    // 2) Persist immediately with an upsert (atomic — no select+insert race that
    //    could silently drop a fast click, even while editing tags).
    const { error } = await supabase.from('ratings').upsert(
      { item_id: itemId, user_id: user.id, rating, updated_at: new Date().toISOString() },
      { onConflict: 'item_id,user_id' }
    );
    if (error) console.error('Rating save failed:', error.message);
  };

  // Mark/clear the chosen winner for a room×category. Optimistic + upsert on
  // the (room_id, category_id) unique key so re-deciding overwrites cleanly.
  const handleSetWinner = async (roomId, categoryId, itemId) => {
    if (!user?.id) return;
    const key = `${roomId}-${categoryId}`;
    setDecisions(prev => ({ ...prev, [key]: { item_id: itemId, decided_by_name: profile?.name } }));
    const { error } = await supabase.from('decisions').upsert(
      { room_id: roomId, category_id: categoryId, item_id: itemId,
        decided_by: user.id, decided_by_name: profile?.name, updated_at: new Date().toISOString() },
      { onConflict: 'room_id,category_id' }
    );
    if (error) console.error('Set winner failed:', error.message);
  };

  const handleClearWinner = async (roomId, categoryId) => {
    const key = `${roomId}-${categoryId}`;
    setDecisions(prev => { const next = { ...prev }; delete next[key]; return next; });
    const { error } = await supabase.from('decisions').delete()
      .eq('room_id', roomId).eq('category_id', categoryId);
    if (error) console.error('Clear winner failed:', error.message);
  };

  // Trash: restore puts an item back; purge deletes it for good (children cascade).
  const handleRestoreItem = async (itemId) => {
    const { error } = await supabase.from('items').update({ deleted_at: null }).eq('id', itemId);
    if (error) { window.alert('Restore failed: ' + error.message); return; }
    loadData(true);
  };
  const handlePurgeItem = async (itemId, title) => {
    if (!window.confirm(`Permanently delete "${title}"?\n\nThis can't be undone — it will be gone for good.`)) return;
    const { error } = await supabase.from('items').delete().eq('id', itemId);
    if (error) { window.alert('Delete failed: ' + error.message); return; }
    loadData(true);
  };

  const toggleSelect = (itemId) => {
    setSelectedItems(prev =>
      prev.includes(itemId) ? prev.filter(id => id !== itemId) : prev.length < 4 ? [...prev, itemId] : prev
    );
  };

  const toggleTagSelect = useCallback((itemId) => {
    setTagSelection(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);
  }, []);

  const exitSelectMode = () => { setSelectMode(false); setTagSelection([]); };

  // Filtered & sorted items
  const filteredItems = useMemo(() => {
    let result = items;
    // 'unsorted' is a special pseudo-room: items with no room AND no category tags.
    if (filterRoom === 'unsorted') result = result.filter(i => i.room_ids.length === 0 && i.category_ids.length === 0);
    else if (filterRoom) result = result.filter(i => i.room_ids.includes(filterRoom));
    if (filterCategory) result = result.filter(i => i.category_ids.includes(filterCategory));
    if (filterType) result = result.filter(i => i.content_type === filterType);
    if (search) result = result.filter(i => i.title.toLowerCase().includes(search.toLowerCase()));

    if (sortBy === 'oldest') {
      result = [...result].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    } else if (sortBy === 'highest') {
      result = [...result].sort((a,b) => {
        const avgA = a.ratings.length ? a.ratings.reduce((s,r)=>s+r.rating,0)/a.ratings.length : 0;
        const avgB = b.ratings.length ? b.ratings.reduce((s,r)=>s+r.rating,0)/b.ratings.length : 0;
        return avgB - avgA;
      });
    } else if (sortBy === 'most_voted') {
      result = [...result].sort((a,b) => b.ratings.length - a.ratings.length);
    } else if (sortBy === 'unrated') {
      result = [...result].sort((a,b) => {
        const aHasMine = a.ratings.some(r => r.user_id === user?.id);
        const bHasMine = b.ratings.some(r => r.user_id === user?.id);
        if (!aHasMine && bHasMine) return -1;
        if (aHasMine && !bHasMine) return 1;
        return 0;
      });
    }
    return result;
  }, [items, filterRoom, filterCategory, filterType, search, sortBy, user]);

  const unsortedCount = items.filter(i => i.room_ids.length === 0 && i.category_ids.length === 0).length;
  const ratedCount = items.filter(i => i.ratings.some(r => r.user_id === user?.id)).length;
  const activeFilterCount = (filterRoom ? 1 : 0) + (filterCategory ? 1 : 0) + (filterType ? 1 : 0);
  const clearFilters = () => { setFilterRoom(null); setFilterCategory(null); setFilterType(null); };

  if (!user) return <LoginScreen supabase={supabase}/>;

  return (
    <div className="min-h-screen">
      {/* HEADER */}
      <header className="glass sticky top-0 z-40 px-4 py-3">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-3">
            <h1 className="font-display text-xl md:text-2xl">
              <span className="text-accent">Batra's</span> <span className="text-dark-100">Forever Home</span>
            </h1>
          </div>
          <div className="flex items-center gap-3">
            {/* Stats */}
            <div className="hidden md:flex items-center gap-4 text-xs text-dark-400">
              <span>{items.length} items</span>
              <span>{ratedCount} rated by you</span>
              {unsortedCount > 0 && <span className="text-accent">{unsortedCount} unsorted</span>}
            </div>
            {/* Notifications + theme */}
            {user && <NotificationBell supabase={supabase} userId={user.id} items={items} onOpenItem={setDetailItem}/>}
            <ThemeSwitcher/>
            {/* Profile */}
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold"
                style={{backgroundColor: profile?.avatar_color || '#f97316'}}>
                {profile?.name?.substring(0,2).toUpperCase() || '??'}
              </div>
              <button onClick={() => supabase.auth.signOut()} className="text-dark-400 hover:text-white text-xs hidden sm:inline">
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* ACTION BAR */}
      <div className="max-w-7xl mx-auto px-4 py-4">
        <div className="flex flex-col sm:flex-row sm:items-center gap-2">
          {/* Buttons — horizontally scrollable on mobile */}
          <div className="flex gap-2 items-center overflow-x-auto no-scrollbar sm:flex-wrap sm:overflow-visible">
            <button onClick={() => setShowAddItem(true)}
              className="hidden sm:flex bg-accent hover:bg-accent-dark text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors items-center gap-1.5 flex-shrink-0">
              + Add Item
            </button>
            <button onClick={() => setShowFloorPlan(true)}
              className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
              📐 Floor Plan
            </button>
            <button onClick={() => setShowLeaderboard(true)}
              className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
              🏆 Leaderboard
            </button>
            <button onClick={() => setShowTrash(true)}
              className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
              🗑 Trash{trashed.length > 0 ? ` (${trashed.length})` : ''}
            </button>
            {!selectMode ? (
              <button onClick={() => { setSelectMode(true); setSelectedItems([]); }}
                className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
                🏷️ Select to tag
              </button>
            ) : (
              <>
                <span className="text-sm font-bold text-purple-400 px-1 flex-shrink-0">{tagSelection.length} selected</span>
                <button onClick={() => setTagSelection(filteredItems.map(i => i.id))}
                  className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
                  Select all ({filteredItems.length})
                </button>
                <button onClick={() => setTagSelection([])}
                  className="bg-dark-700 hover:bg-dark-600 text-dark-200 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex-shrink-0">
                  Clear
                </button>
                <button onClick={() => setShowBatchTag(true)} disabled={tagSelection.length === 0}
                  className="bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors flex-shrink-0">
                  🏷️ Tag {tagSelection.length} item{tagSelection.length === 1 ? '' : 's'}
                </button>
                <button onClick={exitSelectMode} className="text-dark-400 hover:text-white text-sm flex-shrink-0 px-1">Done</button>
              </>
            )}
            {!selectMode && selectedItems.length >= 2 && (
              <button onClick={() => setShowCompare(true)}
                className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors animate-pulse flex-shrink-0">
                ⚔️ Compare {selectedItems.length}
              </button>
            )}
            {!selectMode && selectedItems.length > 0 && (
              <button onClick={() => setSelectedItems([])} className="text-dark-400 hover:text-white text-sm flex-shrink-0 px-1">
                Clear
              </button>
            )}
          </div>

          <div className="hidden sm:block sm:flex-1"/>

          {/* Search + sort — full width on mobile */}
          <div className="flex gap-2">
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search items…"
              className="flex-1 sm:flex-none sm:w-48 bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-dark-100 placeholder-dark-500 focus:outline-none focus:ring-1 focus:ring-accent"/>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              className="bg-dark-800 border border-dark-700 rounded-lg px-3 py-2 text-sm text-dark-200 focus:outline-none focus:ring-1 focus:ring-accent">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="highest">Highest rated</option>
              <option value="most_voted">Most voted</option>
              <option value="unrated">Unrated first</option>
            </select>
          </div>
        </div>
      </div>

      {/* FILTERS */}
      <div className="max-w-7xl mx-auto px-4 pb-4">
        {/* Mobile: collapse filters behind a toggle to save vertical space */}
        <div className="flex items-center justify-between mb-3 sm:hidden">
          <button onClick={() => setFiltersOpen(o => !o)} className="fpill">
            ⚙️ Filters
            {activeFilterCount > 0 && <span className="ml-1 bg-accent text-white rounded-full px-1.5 py-0.5 text-[10px] leading-none">{activeFilterCount}</span>}
            <span className="ml-0.5">{filtersOpen ? '▴' : '▾'}</span>
          </button>
          {activeFilterCount > 0 && (
            <button onClick={clearFilters} className="text-xs text-dark-400 hover:text-accent font-medium">Clear all</button>
          )}
        </div>

        <div className={`${filtersOpen ? 'block' : 'hidden'} sm:block space-y-3`}>
          {/* Rooms */}
          <div>
            <p className="text-[10px] uppercase tracking-widest text-dark-500 mb-1.5">Room</p>
            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 sm:flex-wrap sm:overflow-visible">
              <button onClick={() => setFilterRoom(null)} className={`fpill ${!filterRoom ? 'active' : ''}`}>All Rooms</button>
              <button onClick={() => setFilterRoom('unsorted')} className={`fpill danger ${filterRoom === 'unsorted' ? 'active' : ''}`}>
                📥 Unsorted <span className="cnt">{unsortedCount}</span>
              </button>
              {rooms.map(r => (
                <button key={r.id} onClick={() => setFilterRoom(r.id === filterRoom ? null : r.id)}
                  className={`fpill ${filterRoom === r.id ? 'active' : ''}`}>{r.icon} {r.name}</button>
              ))}
            </div>
          </div>
          {/* Categories */}
          <div>
            <p className="text-[10px] uppercase tracking-widest text-dark-500 mb-1.5">Category</p>
            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 sm:flex-wrap sm:overflow-visible">
              <button onClick={() => setFilterCategory(null)} className={`fpill ${!filterCategory ? 'active' : ''}`}>All Categories</button>
              {categories.map(c => (
                <button key={c.id} onClick={() => setFilterCategory(c.id === filterCategory ? null : c.id)}
                  className={`fpill ${filterCategory === c.id ? 'active' : ''}`}>{c.icon} {c.name}</button>
              ))}
            </div>
          </div>
          {/* Content type */}
          <div>
            <p className="text-[10px] uppercase tracking-widest text-dark-500 mb-1.5">Type</p>
            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 sm:flex-wrap sm:overflow-visible">
              <button onClick={() => setFilterType(null)} className={`fpill ${!filterType ? 'active' : ''}`}>All Types</button>
              {Object.entries(CONTENT_ICONS).map(([k,v]) => {
                const count = items.filter(i => i.content_type === k).length;
                if (count === 0) return null;
                return (
                  <button key={k} onClick={() => setFilterType(k === filterType ? null : k)}
                    className={`fpill ${filterType === k ? 'active' : ''}`}>{v} {k.replace('_',' ')} <span className="cnt">{count}</span></button>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* ITEMS GRID */}
      <div className="max-w-7xl mx-auto px-4 pb-8">
        <div className="flex items-center justify-between mb-4">
          <p className="text-dark-400 text-sm">{filteredItems.length} items</p>
          <p className="text-dark-500 text-xs">
            {selectMode
              ? 'Tap items to select • then "Tag N items" to apply rooms & categories'
              : 'Click items to view details • Check boxes to compare'}
          </p>
        </div>

        {loading ? (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {Array(10).fill(0).map((_,i) => (
              <div key={i} className="rounded-xl overflow-hidden">
                <div className="aspect-[4/3] shimmer"/>
                <div className="p-3 space-y-2 bg-dark-800">
                  <div className="h-4 shimmer rounded w-3/4"/>
                  <div className="h-3 shimmer rounded w-1/2"/>
                </div>
              </div>
            ))}
          </div>
        ) : filteredItems.length === 0 ? (
          <div className="text-center py-16">
            <p className="text-4xl mb-4">🏠</p>
            <p className="text-dark-400 text-lg">No items match your filters</p>
            <p className="text-dark-500 text-sm mt-1">Try adjusting the room or category filter</p>
          </div>
        ) : (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {filteredItems.map(item => (
              <ItemCard key={item.id} item={item} rooms={rooms} categories={categories}
                onRate={handleRate} currentUserId={user.id}
                onSelect={toggleSelect} isSelected={selectedItems.includes(item.id)}
                onOpenDetail={setDetailItem}
                selectMode={selectMode}
                inTagSelection={tagSelection.includes(item.id)}
                onToggleTagSelect={toggleTagSelect}/>
            ))}
          </div>
        )}
      </div>

      {/* MODALS */}
      {detailItem && (
        <ItemDetail item={detailItem} rooms={rooms} categories={categories}
          allRooms={rooms} allCategories={categories}
          onClose={() => { setDetailItem(null); loadData(true); }}
          onRate={handleRate} currentUserId={user.id}
          currentUserName={profile?.name} profiles={allProfiles} supabase={supabase}/>
      )}

      {showCompare && (
        <CompareView items={items.filter(i => selectedItems.includes(i.id))} onClose={() => setShowCompare(false)}/>
      )}

      {showLeaderboard && (
        <LeaderboardView items={items} rooms={rooms} categories={categories} decisions={decisions}
          onClose={() => setShowLeaderboard(false)} onOpenDetail={setDetailItem}
          onSetWinner={handleSetWinner} onClearWinner={handleClearWinner}/>
      )}

      {showTrash && (
        <TrashView items={trashed} onClose={() => setShowTrash(false)}
          onRestore={handleRestoreItem} onPurge={handlePurgeItem}/>
      )}

      {showFloorPlan && (
        <FloorPlanView items={items} rooms={rooms} categories={categories}
          onClose={() => setShowFloorPlan(false)} onOpenDetail={setDetailItem}/>
      )}

      {showAddItem && (
        <AddItemModal onClose={() => setShowAddItem(false)} supabase={supabase}
          rooms={rooms} categories={categories} onAdded={() => loadData(true)}/>
      )}

      {showBatchTag && (
        <BatchTagModal itemIds={tagSelection} allRooms={rooms} allCategories={categories}
          supabase={supabase} onClose={() => setShowBatchTag(false)}
          onDone={() => { setShowBatchTag(false); exitSelectMode(); loadData(true); }}/>
      )}

      {/* Mobile floating Add button */}
      {!selectMode && (
        <button onClick={() => setShowAddItem(true)} aria-label="Add item"
          className="sm:hidden fixed bottom-5 right-5 z-40 w-14 h-14 rounded-full bg-accent text-white flex items-center justify-center fab active:scale-95 transition-transform">
          <span className="text-3xl font-light leading-none mb-0.5">+</span>
        </button>
      )}
    </div>
  );
}

// ─── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [supabase, setSupabase] = useState(null);

  useEffect(() => {
    // Auto-connect with hardcoded credentials
    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      setSupabase(sb);
    }
  }, []);

  if (!supabase) return <div className="min-h-screen flex items-center justify-center"><div className="shimmer w-16 h-16 rounded-full"/></div>;
  return <MainApp supabase={supabase}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
